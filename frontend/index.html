<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖨️ Just-Printing-Server</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css?v=0.2.0">
</head>
<body class="min-h-screen">
    <!-- 认证遮罩（初始显示） -->
    <div id="auth-overlay" class="fixed inset-0 z-50 flex items-center justify-center" style="background: rgba(40, 40, 40, 0.7);">
        <!-- 背景装饰 -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <div class="absolute w-96 h-96 rounded-full opacity-5" style="background: var(--accent); top: -10%; right: -10%; animation: float 6s ease-in-out infinite;"></div>
            <div class="absolute w-64 h-64 rounded-full opacity-5" style="background: var(--accent-orange); bottom: -5%; left: -5%; animation: float 8s ease-in-out infinite reverse;"></div>
        </div>
        <div class="p-8 max-w-md w-full relative" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
            <!-- 图标装饰 -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 mb-4" style="background: var(--accent); border-radius: 8px; animation: float 3s ease-in-out infinite;">
                    <span class="text-5xl">🔐</span>
                </div>
                <h2 class="text-2xl font-bold" style="color: var(--fg0);">欢迎使用</h2>
                <p class="text-sm mt-2" style="color: var(--text-muted);">请输入访问码继续</p>
            </div>
            <!-- 输入框容器 -->
            <div class="relative mb-6">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <span class="text-xl" style="color: var(--text-muted);">🔑</span>
                </div>
                <input type="password" id="pin-input"
                       class="w-full pl-12 pr-5 py-4 text-center text-lg"
                       style="background: var(--bg-base); border: 2px solid var(--border); border-radius: 8px; color: var(--fg0); transition: all 0.3s ease;"
                       placeholder="请输入PIN码" autofocus>
            </div>
            <button id="login-btn" class="btn btn-primary w-full py-4">
                <span class="text-lg">登 录</span>
            </button>
            <div id="auth-error" class="mt-4 text-center hidden" style="color: var(--error); font-size: 14px;"></div>
        </div>
    </div>

    <!-- 主界面（初始隐藏） -->
    <div id="main-app" class="hidden">
        <!-- 标题栏 -->
        <header class="px-6 py-4 flex justify-between items-center transition-smooth" style="background: var(--bg-elevated); border-bottom: 1px solid var(--border);">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 flex items-center justify-center" style="background: var(--accent); border-radius: 6px;">
                    <span class="text-xl">🖨️</span>
                </div>
                <h1 class="text-xl font-bold" style="color: var(--fg0);">Just-Printing</h1>
            </div>
            <div class="flex items-center space-x-3">
                <a href="https://github.com/NIyueeE/just-printing-server" target="_blank" class="link-btn px-4 py-2.5 flex items-center space-x-2" style="color: var(--fg1); border-radius: 6px;">
                    <span class="text-xl">🐙</span>
                    <span class="font-medium hidden sm:inline">GitHub</span>
                </a>
                <a href="javascript:void(0)" id="logout-btn" class="link-btn px-5 py-2.5 font-medium flex items-center space-x-2" style="color: var(--accent); border-radius: 6px;">
                    <span>🚪</span>
                    <span>Quit</span>
                </a>
            </div>
        </header>

        <!-- 响应式布局容器 -->
        <div class="container mx-auto px-4 md:px-6 py-6 md:flex md:space-x-8">
            <!-- 左侧内容区域（上传、文件列表、设置） -->
            <div class="md:w-1/2 space-y-6">
                <!-- 上传区域 -->
                <div>
                    <div id="upload-area"
                         class="p-10 text-center cursor-pointer card-hover"
                         style="border: 3px dashed var(--border); border-radius: 8px; background: var(--bg-elevated);">
                        <div class="text-6xl mb-4" style="animation: float 3s ease-in-out infinite;">📤</div>
                        <p class="text-lg font-medium mb-2" style="color: var(--fg0);">点击选择文件或拖拽至此</p>
                        <p id="supported-formats" class="text-sm" style="color: var(--text-muted);">支持 JPG / PNG / PDF 文件</p>
                        <input type="file" id="file-input" class="hidden" accept="">
                    </div>
                </div>

                <!-- 文件列表 -->
                <div>
                    <h2 class="text-lg font-bold mb-4 px-2" style="color: var(--fg0);">已上传文件</h2>
                    <div id="file-list" class="space-y-3">
                        <!-- 文件项将通过JS动态添加 -->
                    </div>
                </div>

                <!-- 打印机状态和份数 -->
                <div class="mb-4 flex space-x-4">
                    <!-- 打印机状态 -->
                    <div class="flex-1 p-5 transition-smooth card-hover" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
                        <h2 class="text-lg font-bold mb-4" style="color: var(--fg0);">🖨️ 打印机状态</h2>
                        <div id="printer-status" class="flex items-center p-4" style="background: var(--bg-base); border-radius: 6px;">
                            <span class="font-medium" style="color: var(--fg1);" id="status-text">🟡 检测中</span>
                            <span class="ml-auto text-sm" style="color: var(--fg2);" id="printer-name"></span>
                        </div>
                    </div>

                    <!-- 份数设置 -->
                    <div class="w-48 p-5 transition-smooth card-hover" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
                        <label class="block mb-3 font-medium" style="color: var(--fg1);">📋 份数</label>
                        <div class="flex items-center space-x-2">
                            <button id="copies-decrement" class="btn btn-secondary btn-icon w-10 h-10 font-bold">−</button>
                            <input id="copies-input" type="text" value="1"
                                   class="text-center w-14 py-3 text-lg font-bold" style="background: var(--bg-muted); border: none; border-radius: 6px; color: var(--fg0);" readonly>
                            <button id="copies-increment" class="btn btn-secondary btn-icon w-10 h-10 font-bold">+</button>
                        </div>
                    </div>
                </div>

                <!-- 打印设置 -->
                <div>
                    <h2 class="text-lg font-bold mb-4 px-2" style="color: var(--fg0);">⚙️ 打印设置</h2>

                    <!-- 单双面设置 -->
                    <div class="mb-4">
                        <label class="block mb-3 font-medium px-2" style="color: var(--fg1);">📑 单双面</label>
                        <div class="flex space-x-3">
                            <button id="sides-one" class="btn btn-primary flex-1 py-3.5 px-6">📄 单面</button>
                            <button id="sides-two" class="btn btn-secondary flex-1 py-3.5 px-6">📖 双面</button>
                        </div>
                    </div>

                    <!-- 色彩模式 -->
                    <div class="mb-4">
                        <label class="block mb-3 font-medium px-2" style="color: var(--fg1);">🎨 色彩模式</label>
                        <div class="flex space-x-3">
                            <button id="color-bw" class="btn btn-primary flex-1 py-3.5 px-6">⚫ 黑白</button>
                            <button id="color-color" class="btn btn-secondary flex-1 py-3.5 px-6">🌈 彩色</button>
                        </div>
                    </div>

                    <!-- 纸张尺寸和打印分辨率 -->
                    <div class="mb-4 flex space-x-4">
                        <!-- 纸张尺寸 -->
                        <div class="flex-1 p-5 transition-smooth card-hover" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
                            <label class="block mb-3 font-medium" style="color: var(--fg1);">📄 纸张尺寸</label>
                            <select id="media-select" class="w-full py-3 px-4 text-base font-medium" style="background: var(--bg-base); border: 2px solid var(--border); border-radius: 6px; color: var(--fg0);">
                                <option value="iso-a4">A4 (iso-a4)</option>
                            </select>
                        </div>

                        <!-- 打印分辨率 -->
                        <div class="flex-1 p-5 transition-smooth card-hover" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
                            <label class="block mb-3 font-medium" style="color: var(--fg1);">🎯 打印分辨率</label>
                            <select id="resolution-select" class="w-full py-3 px-4 text-base font-medium" style="background: var(--bg-base); border: 2px solid var(--border); border-radius: 6px; color: var(--fg0);">
                                <option value="">获取中...</option>
                            </select>
                        </div>
                    </div>

                    <!-- 打印质量 -->
                    <div class="mb-4">
                        <label class="block mb-3 font-medium px-2" style="color: var(--fg1);">✨ 打印质量</label>
                        <div class="flex space-x-3">
                            <button id="quality-draft" class="btn btn-secondary flex-1 py-3.5 px-6">📝 草稿</button>
                            <button id="quality-normal" class="btn btn-primary flex-1 py-3.5 px-6">📄 标准</button>
                            <button id="quality-high" class="btn btn-secondary flex-1 py-3.5 px-6">💎 高质量</button>
                        </div>
                    </div>

                    <!-- 打印方向 -->
                    <div class="mb-2">
                        <label class="block mb-3 font-medium px-2" style="color: var(--fg1);">🔄 打印方向</label>
                        <div class="flex space-x-3">
                            <button id="orientation-portrait" class="btn btn-primary flex-1 py-3.5 px-6">↕ 纵向</button>
                            <button id="orientation-landscape" class="btn btn-secondary flex-1 py-3.5 px-6">↔ 横向</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧预览区域 -->
            <div class="md:w-1/2 mt-6 md:mt-0">
                <div class="p-6 h-full transition-smooth" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
                    <h2 class="text-lg font-bold mb-5" style="color: var(--fg0);">📄 PDF预览</h2>
                    <div id="preview-desktop" class="hidden">
                        <!-- 桌面端PDF嵌入 -->
                        <div style="border-radius: 6px; overflow: hidden; border: 2px solid var(--border);">
                            <embed id="pdf-embed" type="application/pdf" width="100%" height="650px">
                        </div>
                    </div>
                    <div id="preview-mobile" class="hidden">
                        <!-- 移动端预览按钮 -->
                        <div class="text-center p-10" style="background: var(--bg-muted); border-radius: 6px;">
                            <div class="text-6xl mb-5" style="animation: float 3s ease-in-out infinite;">📄</div>
                            <p id="preview-info" class="mb-6 font-medium text-lg" style="color: var(--fg1);">PDF已生成（共 0 页）</p>
                            <button id="preview-fullscreen" class="btn btn-primary px-10 py-4">
                                🔍 点击全屏预览
                            </button>
                        </div>
                    </div>
                    <div id="preview-empty" class="text-center p-14" style="color: var(--text-muted); background: var(--bg-muted); border-radius: 6px;">
                        <div class="text-6xl mb-5" style="animation: float 4s ease-in-out infinite;">📑</div>
                        <p class="text-lg font-medium mb-2" style="color: var(--fg2);">等待文件上传</p>
                        <p class="text-base">上传文件后预览将在此显示</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏（移动端固定） -->
        <div id="mobile-action-bar" class="fixed bottom-0 left-0 right-0 px-5 py-4 flex justify-between md:hidden transition-smooth" style="background: var(--bg-elevated); border-top: 1px solid var(--border);">
            <button id="cancel-btn" class="btn btn-cancel py-4 px-8">
                <span>❌</span><span>取消</span></button>
            <button id="print-btn" class="btn btn-primary py-4 px-10">
                <span>🖨️</span><span>打印</span></button>
        </div>

        <!-- 桌面端操作栏 -->
        <div class="mt-10 pb-10 px-4 hidden md:block">
            <div class="flex justify-center space-x-8">
                <button id="cancel-btn-desktop" class="btn btn-cancel py-5 px-12">
                    <span>❌</span><span>取消</span></button>
                <button id="print-btn-desktop" class="btn btn-primary py-5 px-12">
                    <span>🖨️</span><span>打印</span></button>
            </div>
        </div>
        <!-- 移动端底部 spacer -->
        <div class="h-24 md:hidden"></div>
    </div>

    <!-- Toast通知容器 -->
    <div id="toast-container" class="fixed bottom-8 right-8 space-y-3 z-50"></div>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 z-40 hidden items-center justify-center" style="background: rgba(40, 40, 40, 0.6);">
        <div class="p-8 text-center" style="background: var(--bg-elevated); border-radius: 8px; border: 1px solid var(--border);">
            <div class="relative">
                <div class="animate-spin rounded-full h-16 w-16 mx-auto mb-5" style="border: 4px solid var(--border-light); border-top-color: var(--accent); border-right-color: var(--accent);"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="animate-spin rounded-full h-10 w-10" style="border: 3px solid transparent; border-top-color: var(--accent);"></div>
                </div>
            </div>
            <div class="text-3xl mb-3">⏳</div>
            <p id="loading-text" class="text-center font-medium text-lg" style="color: var(--fg0);">正在处理...</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js?v=0.2.0"></script>
</body>
</html>
